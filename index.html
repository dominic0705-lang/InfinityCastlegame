<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three.js 無限城 - 30招全獨立運鏡極致版</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Microsoft JhengHei', sans-serif; }
        
        /* 紅藍漸層專用語法 */
        .rb-gradient-text {
            background: linear-gradient(90deg, #ff1744, #00b0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 15px rgba(255,23,68,0.6)) drop-shadow(0 0 15px rgba(0,176,255,0.6));
        }

        .rb-gradient-border {
            border-image: linear-gradient(135deg, #ff1744, #00b0ff) 1;
            box-shadow: 0 0 25px rgba(255,23,68,0.4), 0 0 25px rgba(0,176,255,0.4);
        }

        /* 頂部按鈕列 (暫停與設定) - 調高 z-index 確保無時無刻都在最上層 */
        .top-bar {
            position: absolute; top: 0; left: 0; width: 100%; height: 80px;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 40px; box-sizing: border-box; z-index: 90; pointer-events: none;
        }
        .top-btn {
            pointer-events: auto; background: rgba(10, 10, 15, 0.6); border: 1px solid rgba(255,255,255,0.2);
            color: #fff; padding: 10px 20px; font-size: 1.2rem; border-radius: 8px;
            cursor: pointer; backdrop-filter: blur(8px); transition: all 0.3s;
            letter-spacing: 2px; font-weight: bold;
        }
        .top-btn:hover { 
            background: linear-gradient(135deg, rgba(255,23,68,0.3), rgba(0,176,255,0.3)); 
            border: 1px solid transparent; border-image: linear-gradient(135deg, #ff1744, #00b0ff) 1;
            box-shadow: 0 0 15px rgba(255,23,68,0.5), 0 0 15px rgba(0,176,255,0.5); 
        }

        /* 載入畫面 */
        #loading-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 100;
            background: #050505; display: flex; flex-direction: column; transition: opacity 0.8s ease-in-out;
        }
        .loading-img-container {
            height: 75%; width: 100%;
            background-image: url('載入畫面.jpg'); 
            background-size: cover; background-position: center;
            border-bottom: 2px solid #ff1744;
            box-shadow: 0 10px 50px rgba(255, 23, 68, 0.3);
        }
        .loading-bottom {
            height: 25%; position: relative; display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(circle, rgba(20, 5, 10, 1) 0%, rgba(0,0,0,1) 100%);
        }
        #progress-bar-container {
            width: 50%; height: 12px; background: #222; border-radius: 8px; overflow: hidden; margin-bottom: 20px;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 0 15px rgba(0,176,255,0.3); border: 1px solid #444;
        }
        #progress-bar { width: 0%; height: 100%; background: linear-gradient(90deg, #ff1744, #00b0ff); transition: width 0.3s cubic-bezier(0.2, 0.8, 0.2, 1); }
        #progress-text { color: #fff; font-size: 1.8rem; letter-spacing: 5px; font-weight: bold; text-shadow: 0 0 10px #ff1744, 0 0 10px #00b0ff; }
        .version-text { position: absolute; bottom: 20px; left: 30px; color: #888; font-size: 1.2rem; font-family: monospace; letter-spacing: 2px;}
        .author-text { position: absolute; bottom: 20px; right: 30px; color: #aaa; font-size: 1.2rem; letter-spacing: 2px;}

        /* 預覽畫面 (點擊任一處開始) */
        #preview-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 50;
            display: none; flex-direction: column; align-items: center; justify-content: space-between;
            background: transparent; pointer-events: auto; cursor: pointer; padding: 6vh 0;
            transition: opacity 0.5s;
        }
        #preview-title {
            font-size: 6rem; font-weight: 900; letter-spacing: 30px; margin-top: 2vh; text-align: center;
        }
        #preview-hint {
            font-size: 2.2rem; color: #fff; text-shadow: 0 0 20px #fff;
            font-weight: bold; letter-spacing: 10px; margin-bottom: 5vh; animation: blink 1.5s infinite;
        }

        /* 全新首頁輪播介面 */
        #home-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 45;
            display: none; flex-direction: column; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.1); backdrop-filter: blur(5px); pointer-events: none;
            transition: opacity 0.5s;
        }
        .carousel-wrapper {
            position: relative; width: 100%; height: 500px; display: flex; justify-content: center; align-items: center; perspective: 1200px; pointer-events: auto;
        }
        .carousel-card {
            position: absolute; width: 300px; height: 450px; background: rgba(15, 15, 20, 0.8);
            border: 2px solid rgba(255,255,255,0.1); border-radius: 12px; overflow: hidden;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1); cursor: pointer; box-shadow: 0 15px 40px rgba(0,0,0,0.8);
            backdrop-filter: blur(10px);
        }
        .carousel-card.active { 
            transform: translateX(0) scale(1.15); z-index: 10; opacity: 1; 
            border: 2px solid transparent; border-image: linear-gradient(135deg, #ff1744, #00b0ff) 1;
            box-shadow: 0 0 35px rgba(255,23,68,0.4), 0 0 35px rgba(0,176,255,0.4); 
        }
        .carousel-card.prev { transform: translateX(-350px) scale(0.85) rotateY(15deg); z-index: 5; opacity: 0.6; }
        .carousel-card.next { transform: translateX(350px) scale(0.85) rotateY(-15deg); z-index: 5; opacity: 0.6; }
        .carousel-card.hidden-left { transform: translateX(-650px) scale(0.6) rotateY(25deg); z-index: 1; opacity: 0; pointer-events: none; }
        .carousel-card.hidden-right { transform: translateX(650px) scale(0.6) rotateY(-25deg); z-index: 1; opacity: 0; pointer-events: none; }
        
        .card-img { height: 66.66%; background-size: cover; background-position: center; border-bottom: 2px solid #333; background-color: #222; }
        .card-info { height: 33.33%; padding: 15px; color: #fff; text-align: center; display: flex; flex-direction: column; justify-content: center; align-items: center; background: linear-gradient(0deg, rgba(0,0,0,0.9), rgba(20,20,25,0.6)); }
        .card-info h2 { margin: 0 0 8px 0; font-size: 1.8rem; letter-spacing: 5px; text-shadow: 0 0 10px #ff1744; font-weight: 900; }
        .carousel-card.active .card-info h2 { background: linear-gradient(90deg, #ff1744, #00b0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-shadow: none; filter: drop-shadow(0 0 8px rgba(255,255,255,0.2)); }
        .card-info p { margin: 0; font-size: 1rem; color: #ccc; letter-spacing: 1px; }
        
        .nav-arrow { position: absolute; top: 50%; transform: translateY(-50%); font-size: 4rem; color: rgba(255,255,255,0.4); cursor: pointer; z-index: 20; transition: color 0.3s; text-shadow: 0 0 15px #000; pointer-events: auto; }
        .nav-arrow:hover { color: #fff; text-shadow: 0 0 20px #00b0ff, 0 0 20px #ff1744; }
        #nav-left { left: 8%; }
        #nav-right { right: 8%; }

        /* 疊加選單 (暫停與設定) */
        .overlay-menu {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.7); backdrop-filter: blur(12px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
            z-index: 80; color: #fff;
        }
        .overlay-menu h1 { font-size: 4.5rem; letter-spacing: 15px; margin-bottom: 40px; font-weight: 900; }
        .overlay-btn {
            background: rgba(15,15,20,0.6); border: 1px solid rgba(255,255,255,0.2); color: #fff;
            padding: 15px 40px; font-size: 1.5rem; border-radius: 8px; margin: 10px;
            cursor: pointer; transition: all 0.3s; letter-spacing: 5px; width: 320px; font-weight: bold;
        }
        .overlay-btn:hover { 
            background: linear-gradient(135deg, rgba(255,23,68,0.3), rgba(0,176,255,0.3)); 
            border-color: transparent; border-image: linear-gradient(135deg, #ff1744, #00b0ff) 1;
            box-shadow: 0 0 25px rgba(255,23,68,0.5), 0 0 25px rgba(0,176,255,0.5); 
        }

        /* 設定選單專用 */
        .setting-row { display: flex; justify-content: space-between; align-items: center; width: 450px; margin-bottom: 20px; }
        .setting-row span { font-size: 1.6rem; font-weight: bold; letter-spacing: 2px; }
        .overlay-btn.small { padding: 10px 20px; font-size: 1.2rem; width: 220px; margin: 0; }
        
        /* 手機虛擬按鍵 */
        #mobile-controls {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 35; display: none;
        }
        .m-btn {
            position: absolute; width: 65px; height: 65px; border-radius: 50%; background: rgba(20,20,30,0.6);
            border: 2px solid rgba(255,255,255,0.3); color: #fff; display: flex; justify-content: center; align-items: center;
            font-size: 1.4rem; font-weight: bold; pointer-events: auto; user-select: none; backdrop-filter: blur(4px);
        }
        .m-btn:active { background: rgba(255,170,0,0.6); border-color: #ffaa00; box-shadow: 0 0 20px #ffaa00; transform: scale(0.9); }
        #m-atk { bottom: 40px; right: 120px; width: 85px; height: 85px; font-size: 2rem; border-color: #ff1744; }
        #m-jump { bottom: 140px; right: 60px; }
        #m-dash { bottom: 40px; right: 20px; }
        #joystick-zone { position: absolute; bottom: 40px; left: 40px; width: 140px; height: 140px; border-radius: 50%; border: 2px dashed rgba(255,255,255,0.2); pointer-events: none; }
        .m-dir { position: absolute; width: 45px; height: 45px; background: rgba(255,255,255,0.15); border-radius: 8px; display: flex; justify-content: center; align-items: center; color: white; user-select: none; pointer-events: auto; backdrop-filter: blur(4px); }
        .m-dir:active { background: rgba(0,176,255,0.6); border: 1px solid #00b0ff; box-shadow: 0 0 15px #00b0ff;}
        #m-cam-zone { position: absolute; top: 0; right: 0; width: 50%; height: 60%; pointer-events: auto; z-index: 30; touch-action: none; }

        /* 角色選擇介面 (透視預覽) */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: none; flex-direction: column; justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(8px);
            color: white; z-index: 40; opacity: 0; transition: opacity 0.5s;
        }
        #char-select { text-align: center; }
        #char-select h1 { font-size: 4.5rem; letter-spacing: 15px; margin-bottom: 40px; font-weight: 900; }
        .char-cards { display: flex; gap: 35px; flex-wrap: wrap; justify-content: center; }
        .card {
            width: 250px; padding: 40px 20px; background: rgba(15, 15, 20, 0.65);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; cursor: pointer;
            transition: all 0.3s cubic-bezier(0.2, 0.8, 0.2, 1);
            backdrop-filter: blur(10px); box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .card h2 { font-size: 2.2rem; margin: 0 0 10px 0; font-weight: 900; }
        .card p { font-size: 1.1rem; margin: 0; opacity: 0.8; letter-spacing: 2px; }

        .card:hover { border-color: transparent; border-image: linear-gradient(135deg, #ff1744, #00b0ff) 1; box-shadow: 0 0 35px rgba(255,23,68,0.4), 0 0 35px rgba(0,176,255,0.4); background: rgba(20, 15, 25, 0.85); transform: translateY(-12px) scale(1.05); }

        .card.giyu h2 { color: #00ccff; text-shadow: 0 0 15px #0066ff; }
        .card.tanjiro h2 { color: #ff5500; text-shadow: 0 0 15px #ff2200; }
        .card.akaza h2 { color: #ff55cc; text-shadow: 0 0 15px #ff00aa; }

        /* 遊戲內 UI 元素 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 4px; height: 4px; background: #ffffff; border-radius: 50%; pointer-events: none; z-index: 5;
            box-shadow: 0 0 12px 3px rgba(255,255,255,0.5); transition: transform 0.1s cubic-bezier(0.1, 0.9, 0.2, 1);
            display: none;
        }
        
        #gravity-timer {
            position: absolute; top: 30px; left: 50%; transform: translateX(-50%);
            font-size: 1.4rem; color: #fff; font-weight: bold; text-shadow: 0 0 15px #ff1744, 0 0 5px #00b0ff;
            z-index: 5; background: rgba(10,5,15,0.85); padding: 10px 35px; border: 1px solid rgba(255,23,68,0.5);
            display: none; letter-spacing: 4px; border-radius: 8px; box-shadow: 0 0 20px rgba(255,23,68,0.3);
        }

        #wave-alert {
            position: absolute; top: 20%; left: 50%; transform: translateX(-50%);
            font-size: 3.5rem; color: #ff1744; text-shadow: 0 0 40px #ff1744, 0 0 15px #fff;
            font-weight: 900; letter-spacing: 15px; z-index: 5; display: none; text-align: center; pointer-events: none; white-space: nowrap;
        }

        #attack-name {
            position: absolute; bottom: 22%; left: 50%; transform: translateX(-50%);
            font-size: 5.5rem; color: #ffffff; font-weight: 900; letter-spacing: 15px;
            text-shadow: 0 0 40px #000, 0 0 20px #fff;
            z-index: 15; pointer-events: none; opacity: 0;
            white-space: nowrap; font-style: italic; transition: opacity 0.2s, transform 0.1s;
        }

        /* 技能熱鍵欄位 (30招縮圖) */
        #skill-bar {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            display: none; gap: 12px; z-index: 20;
        }
        .skill-slot {
            width: 55px; height: 55px; border: 2px solid rgba(255,255,255,0.2);
            border-radius: 6px; background-size: cover; background-position: center;
            background-color: #222; 
            position: relative; overflow: hidden; box-shadow: 0 0 15px rgba(0,0,0,0.8);
            transition: all 0.15s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .skill-slot.active {
            transform: scale(1.2) translateY(-10px);
            border: 2px solid transparent; border-image: linear-gradient(135deg, #ff1744, #00b0ff) 1;
            box-shadow: 0 0 25px rgba(255,23,68,0.6), 0 0 25px rgba(0,176,255,0.6);
            z-index: 21;
        }
        .skill-key {
            position: absolute; bottom: 2px; right: 4px; font-size: 1rem; font-weight: bold;
            color: #fff; text-shadow: 1px 1px 3px #000, -1px -1px 3px #000;
        }

        .pulse { animation: pulseAnim 0.3s infinite alternate; }
        @keyframes blink { 0%, 100% { opacity: 1; filter: drop-shadow(0 0 10px rgba(255,255,255,0.8)); } 50% { opacity: 0.4; filter: none; } }
        @keyframes pulseAnim { from { opacity: 0.4; transform: translateX(-50%) scale(0.95); } to { opacity: 1; transform: translateX(-50%) scale(1.05); } }
        #damage-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 25; background: rgba(255, 23, 68, 0.5); opacity: 0; mix-blend-mode: overlay; transition: opacity 0.3s; }
        .cinematic-bar { position: absolute; left: 0; width: 100%; height: 0; background: #000; z-index: 12; transition: height 0.4s cubic-bezier(0.2, 0.8, 0.2, 1); pointer-events: none; }
        #cinematic-top { top: 0; }
        #cinematic-bottom { bottom: 0; }
    </style>
    
    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.136.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.136.0/examples/jsm/"
        }
    }
    </script>
</head>
<body>
    <!-- 頂部按鈕 -->
    <div class="top-bar">
        <div id="btn-pause" class="top-btn" onclick="togglePause()">❚❚ 暫停</div>
        <div id="btn-settings" class="top-btn" onclick="openSettings()">⚙ 設定</div>
    </div>

    <!-- 載入畫面 -->
    <div id="loading-screen">
        <div class="loading-img-container"></div>
        <div class="loading-bottom">
            <div id="progress-bar-container"><div id="progress-bar"></div></div>
            <div id="progress-text">準備進入無限城... 0%</div>
            <div class="version-text">v3.0</div>
            <div class="author-text">作者: 施棨耀 x gemini</div>
        </div>
    </div>

    <!-- 預覽畫面 (點擊任一處開始) -->
    <div id="preview-screen">
        <div id="preview-title" class="rb-gradient-text">無限城<br><span style="font-size: 2rem; letter-spacing: 15px; color:#ccc; -webkit-text-fill-color: #ccc; filter:none; background:none;">極致運鏡還原版</span></div>
        <div id="preview-hint">點擊任一處開始</div>
    </div>

    <!-- 全新首頁輪播介面 -->
    <div id="home-screen">
        <div id="nav-left" class="nav-arrow" onclick="navCarousel(-1)">❮</div>
        <div class="carousel-wrapper" id="carousel-wrapper">
            <div class="carousel-card" onclick="selectMode(0)">
                <div class="card-img" style="background-image: url('無盡.jpg');"></div>
                <div class="card-info"><h2>無盡</h2><p></p></div>
            </div>
            <div class="carousel-card active" onclick="selectMode(1)">
                <div class="card-img" style="background-image: url('基本.jpg');"></div>
                <div class="card-info"><h2>基本</h2><p>原著30招特效全開</p></div>
            </div>
            <div class="carousel-card" onclick="selectMode(2)">
                <div class="card-img" style="background-image: url('訓練.jpg');"></div>
                <div class="card-info"><h2>訓練</h2><p></p></div>
            </div>
            <div class="carousel-card" onclick="selectMode(3)">
                <div class="card-img" style="background-image: url('自訂動畫.jpg');"></div>
                <div class="card-info"><h2>自訂動畫</h2><p></p></div>
            </div>
            <div class="carousel-card" onclick="selectMode(4)">
                <div class="card-img" style="background-image: url('選擇角色.jpg');"></div>
                <div class="card-info"><h2>角色選擇</h2><p>選擇參戰角色</p></div>
            </div>
        </div>
        <div id="nav-right" class="nav-arrow" onclick="navCarousel(1)">❯</div>
    </div>

    <!-- 暫停選單 -->
    <div id="pause-menu" class="overlay-menu">
        <h1 class="rb-gradient-text">遊戲暫停</h1>
        <button class="overlay-btn" onclick="resumeGame()">繼續遊戲</button>
        <button class="overlay-btn" onclick="returnToHome()">回首頁</button>
    </div>

    <!-- 設定選單 -->
    <div id="settings-menu" class="overlay-menu">
        <h1 class="rb-gradient-text">設定</h1>
        <div class="setting-row">
            <span>操作模式</span>
            <button id="btn-toggle-device" class="overlay-btn small" onclick="toggleDeviceMode()">自動偵測中...</button>
        </div>
        <div class="setting-row">
            <span>動畫運鏡</span>
            <button id="btn-toggle-cinematic" class="overlay-btn small" onclick="toggleCinematic()">開啟 (ON)</button>
        </div>
        <button class="overlay-btn" style="margin-top: 40px;" onclick="closeSettings()">關閉</button>
    </div>

    <!-- 角色選擇介面 (透視預覽) -->
    <div id="ui-layer">
        <div id="char-select">
            <h1 class="rb-gradient-text">選擇參戰角色</h1>
            <div class="char-cards">
                <div class="card giyu" onmouseenter="previewHoverChar('giyu')" onclick="selectChar('giyu')"><h2>富岡義勇</h2><p>水之呼吸</p></div>
                <div class="card tanjiro" onmouseenter="previewHoverChar('tanjiro')" onclick="selectChar('tanjiro')"><h2>竈門炭治郎</h2><p>火之神神樂</p></div>
                <div class="card akaza" onmouseenter="previewHoverChar('akaza')" onclick="selectChar('akaza')"><h2>猗窩座</h2><p>上弦之參・破壞殺</p></div>
            </div>
            <button class="overlay-btn" style="margin-top:40px; font-size:1.2rem; padding: 10px 30px;" onclick="returnToHome()">返回首頁</button>
        </div>
    </div>
    
    <div id="cinematic-top" class="cinematic-bar"></div>
    <div id="cinematic-bottom" class="cinematic-bar"></div>
    
    <div id="crosshair"></div>
    <div id="gravity-timer">血鬼術・空間變換: 10.0s</div>
    <div id="wave-alert">⚠️ 空間震動徵兆 ⚠️</div>
    <div id="attack-name"></div>
    <div id="damage-overlay"></div>

    <!-- 手機虛擬按鍵 -->
    <div id="mobile-controls">
        <div id="joystick-zone">
            <div class="m-dir" style="top:0; left:47px;" onpointerdown="if(playerPhysics) playerPhysics.moveForward=true" onpointerup="if(playerPhysics) playerPhysics.moveForward=false" onpointerleave="if(playerPhysics) playerPhysics.moveForward=false">W</div>
            <div class="m-dir" style="bottom:0; left:47px;" onpointerdown="if(playerPhysics) playerPhysics.moveBackward=true" onpointerup="if(playerPhysics) playerPhysics.moveBackward=false" onpointerleave="if(playerPhysics) playerPhysics.moveBackward=false">S</div>
            <div class="m-dir" style="top:47px; left:0;" onpointerdown="if(playerPhysics) playerPhysics.moveLeft=true" onpointerup="if(playerPhysics) playerPhysics.moveLeft=false" onpointerleave="if(playerPhysics) playerPhysics.moveLeft=false">A</div>
            <div class="m-dir" style="top:47px; right:0;" onpointerdown="if(playerPhysics) playerPhysics.moveRight=true" onpointerup="if(playerPhysics) playerPhysics.moveRight=false" onpointerleave="if(playerPhysics) playerPhysics.moveRight=false">D</div>
        </div>
        <div id="m-atk" class="m-btn" onpointerdown="if(playerPhysics) playerPhysics.triggerPlayerAttack(0)">攻</div>
        <div id="m-jump" class="m-btn" onpointerdown="if(playerPhysics && playerPhysics.canJump) { playerPhysics.velocity.y += playerPhysics.jumpStrength; playerPhysics.canJump = false; }">跳</div>
        <div id="m-dash" class="m-btn" onpointerdown="if(playerPhysics) playerPhysics.triggerPlayerDash()">閃</div>
        <div id="m-cam-zone"></div>
    </div>

    <!-- 熱鍵技能 UI -->

            update(delta) {
                const camDir = new THREE.Vector3(0,0,-1).applyQuaternion(this.camera.quaternion);
                for (let i = this.slashes.length - 1; i >= 0; i--) {
                    let s = this.slashes[i]; s.life -= delta;
                    if (s.life <= 0) { 
                        s.mesh.children[0].material.dispose(); s.mesh.children[1].material.dispose(); this.scene.remove(s.mesh); this.slashes.splice(i, 1); 
                    } else {
                        let progress = 1.0 - (s.life / s.maxLife); s.mesh.scale.copy(s.startScale).multiplyScalar(1.0 + Math.pow(progress, 0.6) * 1.8); 
                        if (s.customUpdate) s.customUpdate(s, delta); else s.mesh.translateY(-120 * delta); 
                        s.texOffset -= delta * 4.0; s.mesh.children[0].material.uniforms.uOffset.value = s.texOffset; s.mesh.children[1].material.uniforms.uOffset.value = s.texOffset;
                        let op = Math.pow(Math.sin(Math.PI * (s.life / s.maxLife)), 0.4); 
                        s.mesh.children[1].material.uniforms.uOpacity.value = op; if(s.light) s.light.intensity = 5.0 * op;
                        if (Math.random() > 0.2) this.spawnSplash(s.mesh.position, camDir, 10, 1.5, 0.2);
                    }
                }
                for (let i = this.shockwaves.length - 1; i >= 0; i--) {
                    let sw = this.shockwaves[i]; sw.life -= delta;
                    if(sw.life <= 0) { this.scene.remove(sw.mesh); sw.mesh.material.dispose(); sw.mesh.geometry.dispose(); this.shockwaves.splice(i, 1); }
                    else { let p = 1.0 - (sw.life / sw.maxLife); let s = sw.maxScale * Math.pow(p, 0.5); sw.mesh.scale.set(s,s,s); sw.mesh.material.opacity = 1.0 - p; }
                }
                for (let i = this.kanjis.length - 1; i >= 0; i--) {
                    let k = this.kanjis[i]; k.life -= delta;
                    if (k.life <= 0) { this.scene.remove(k.mesh); k.mesh.material.map.dispose(); k.mesh.material.dispose(); this.kanjis.splice(i, 1); }

                const cx = Math.floor(localPlayerPos.x / this.chunkSize), cy = Math.floor(localPlayerPos.y / this.chunkSize), cz = Math.floor(localPlayerPos.z / this.chunkSize);

                for (let x = -this.viewDistance; x <= this.viewDistance; x++) { for (let y = -this.viewDistance; y <= this.viewDistance; y++) { for (let z = -this.viewDistance; z <= this.viewDistance; z++) { const gridX = cx + x, gridY = cy + y, gridZ = cz + z; if ((Math.abs(gridX) <= 1 && Math.abs(gridY) <= 1 && Math.abs(gridZ) <= 1) || (gridY > 1 && Math.abs(gridX) <= 1 && Math.abs(gridZ) <= 1)) continue; const isCatchPoint = (gridX === catchCx && gridY === catchCy && gridZ === catchCz); if (!isCatchPoint && x*x + y*y + z*z > this.viewDistance * this.viewDistance * 1.2) continue; if (Math.random() > 0.3 && !isCatchPoint) continue; const key = `${gridX},${gridY},${gridZ}`; if (!this.activeChunks.has(key)) this.activeChunks.set(key, this.createGridModule(gridX, gridY, gridZ, isCatchPoint ? 'platform' : null)); this.activeChunks.get(key).userData.lastFrame = this.frameId; } } }
                for (let [key, chunk] of this.activeChunks.entries()) { if (chunk.userData.lastFrame !== this.frameId) this.removeChunk(key); else chunk.position.lerp(chunk.userData.targetPos, 0.08); }

                this.dynamicCorridors.forEach(b => { b.userData.velocity.copy(b.userData.moveAxis).multiplyScalar(b.userData.speed * b.userData.dir); b.position.add(_v2.copy(b.userData.velocity).multiplyScalar(delta)); if (b.position.distanceTo(localPlayerPos) > 3800) { const axisKey = b.userData.moveAxis.x ? 'x' : (b.userData.moveAxis.y ? 'y' : 'z'); b.position[axisKey] = localPlayerPos[axisKey] - (b.userData.dir * 3700); if (axisKey !== 'x') b.position.x = localPlayerPos.x + (Math.random()-0.5) * 3500; if (axisKey !== 'y') b.position.y = localPlayerPos.y + (Math.random()-0.5) * 3500; if (axisKey !== 'z') b.position.z = localPlayerPos.z + (Math.random()-0.5) * 3500; } });

                if(player) {
                    this.waveTimer -= delta;
                    if (this.waveState === this.WAVE_IDLE) {
                        this.uiSystemTimer.innerText = `下波空間重組: ${Math.max(0, this.waveTimer).toFixed(1)}s`;
                        if (this.waveTimer <= 0) { this.waveState = this.WAVE_RUMBLE; this.waveTimer = 4.0; this.uiAlert.innerText = '⚠️ 空間震動徵兆 ⚠️'; this.uiAlert.style.display = 'block'; this.uiAlert.classList.add('pulse'); this.dmgOverlay.style.opacity = '0.4'; }
                    } else if (this.waveState === this.WAVE_RUMBLE) {
                        this.uiSystemTimer.innerText = `警告：結構即將崩壞`; player.addCameraShake((4.0 - this.waveTimer) * 3.0); this.dmgOverlay.style.opacity = (0.2 + Math.random()*0.3).toString();
                        if (this.waveTimer <= 0) { this.waveState = this.WAVE_DASH; this.waveTimer = 7.0; this.uiAlert.innerText = '血鬼術・百鬼夜行'; this.uiAlert.classList.remove('pulse'); this.dmgOverlay.style.opacity = '0.1'; for (let b of this.allBuildings) { b.dir = Math.random() > 0.5 ? 1 : -1; b.currentSpeed = b.baseSpeed * (1.2 + Math.random() * 0.8); } sfx.playBuildingRumble(); } 
                    } else if (this.waveState === this.WAVE_DASH) {
                        this.uiSystemTimer.innerText = `空間大挪移中...`; let needsUpdate = false, ease = 1 - Math.pow(1 - (this.waveTimer / 7.0), 3);
                        if (this.waveTimer < 1.0) this.uiAlert.style.opacity = this.waveTimer; 
                        for (let b of this.allBuildings) { b.velocity.copy(b.moveAxis).multiplyScalar(b.currentSpeed * b.dir * Math.max(ease, 0.05)); b.pos.add(_v2.copy(b.velocity).multiplyScalar(delta)); needsUpdate = true; if (b.pos.distanceTo(localPlayerPos) > 18000) { const axisKey = b.moveAxis.x ? 'x' : (b.moveAxis.y ? 'y' : 'z'); b.pos[axisKey] = localPlayerPos[axisKey] - (b.dir * 17000); if (axisKey !== 'x') b.pos.x = localPlayerPos.x + (Math.random()-0.5)*25000; if (axisKey !== 'y') b.pos.y = localPlayerPos.y + (Math.random()-0.5)*25000; if (axisKey !== 'z') b.pos.z = localPlayerPos.z + (Math.random()-0.5)*25000; b.pos.x = Math.round(b.pos.x/800)*800; b.pos.y = Math.round(b.pos.y/800)*800; b.pos.z = Math.round(b.pos.z/800)*800; } }
                        if (needsUpdate) this.updateAllMatrices();
                        if (this.waveTimer <= 0) { this.waveState = this.WAVE_IDLE; this.waveTimer = 15.0 + Math.random() * 10.0; this.uiAlert.style.display = 'none'; this.uiAlert.style.opacity = '1'; this.dmgOverlay.style.opacity = '0'; for (let b of this.allBuildings) b.velocity.set(0,0,0); this.updateAllMatrices(); }
                    }
                    
                    if (this.waveState === this.WAVE_IDLE && player.isFlying) { let needsUpdate = false; for (let b of this.allBuildings) { if (b.pos.distanceTo(localPlayerPos) > 20000) { b.pos.x = localPlayerPos.x + (Math.random()-0.5)*25000; b.pos.y = localPlayerPos.y + (Math.random()-0.5)*25000; b.pos.z = localPlayerPos.z + (Math.random()-0.5)*25000; b.pos.x = Math.round(b.pos.x/800)*800; b.pos.y = Math.round(b.pos.y/800)*800; b.pos.z = Math.round(b.pos.z/800)*800; needsUpdate = true; } } if (needsUpdate) this.updateAllMatrices(); }
                }
            }
        }

        function initThreeScene() {
            scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x010005, 0.00032); scene.background = new THREE.Color(0x010002); 
            camera = new THREE.PerspectiveCamera(85, window.innerWidth / window.innerHeight, 0.1, 40000);

            renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" }); 
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.toneMapping = THREE.NoToneMapping; 
            renderer.shadowMap.enabled = true; renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            
            const maxAnisotropy = renderer.capabilities.getMaxAnisotropy();
            [texDarkWood, texFloorWood, texCrimson, texPaper, texTatami, texRoof].forEach(tex => { tex.anisotropy = maxAnisotropy; });
            document.body.appendChild(renderer.domElement);

            composer = new EffectComposer(renderer); 
            composer.addPass(new RenderPass(scene, camera)); 
            
            composer.addPass(new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.0, 0.5, 0.4));

            outlinePass = new OutlinePass(new THREE.Vector2(window.innerWidth, window.innerHeight), scene, camera);
            outlinePass.edgeStrength = 4.0;
            outlinePass.edgeGlow = 0.0;
            outlinePass.edgeThickness = 1.0;
            outlinePass.visibleEdgeColor.set('#000000');
            outlinePass.hiddenEdgeColor.set('#000000');
            composer.addPass(outlinePass);

            const PosterizeShader = {
                uniforms: {
                    'tDiffuse': { value: null },
                    'bins': { value: 12.0 }
                },
                vertexShader: `
                    varying vec2 vUv;
                    void main() {
                        vUv = uv;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform sampler2D tDiffuse;
                    uniform float bins;
                    varying vec2 vUv;
                    void main() {
                        vec4 texColor = texture2D(tDiffuse, vUv);
                        texColor.rgb = floor(texColor.rgb * bins) / bins;
                        gl_FragColor = texColor;
                    }
                `
            };
            const posterizePass = new ShaderPass(PosterizeShader);
            composer.addPass(posterizePass);

            scene.add(new THREE.HemisphereLight(0x0a0a1a, 0x331111, 0.8));
            bloodMoonLight = new THREE.DirectionalLight(0xff2200, 2.5); bloodMoonLight.castShadow = true;
            bloodMoonLight.shadow.mapSize.width = 2048; bloodMoonLight.shadow.mapSize.height = 2048; bloodMoonLight.shadow.camera.near = 500; bloodMoonLight.shadow.camera.far = 12000; bloodMoonLight.shadow.camera.left = -4000; bloodMoonLight.shadow.camera.right = 4000; bloodMoonLight.shadow.camera.top = 4000; bloodMoonLight.shadow.camera.bottom = -4000; bloodMoonLight.shadow.bias = -0.001;
            scene.add(bloodMoonLight); scene.add(bloodMoonLight.target);

            window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); composer.setSize(window.innerWidth, window.innerHeight); });
        }

        // --- 全局畫面渲染迴圈 (加入 isPaused 凍結保護) ---
        function animate(time) {
            requestAnimationFrame(animate); 
            const delta = Math.min(clock.getDelta(), 0.05); 
            
            // 只有在非暫停狀態才進行物理、動畫、特效的推進
            if (!isPaused) {
                tweenManager.update(time);
                
                if (isPreviewMode && previewTanjiro) {
                    const targetRotX = -0.2 - mouseY;
                    const targetRotY = -mouseX;
                    camera.rotation.y += (targetRotY - camera.rotation.y) * 0.05;
                    camera.rotation.x += (targetRotX - camera.rotation.x) * 0.05;
                    
                    previewTanjiro.model.position.y = -2 + Math.sin(time * 0.002) * 1.5;
                    
                    if(castleSystem) castleSystem.update(camera, delta); 
                    
                    camera.getWorldPosition(_worldPos); 
                    bloodMoonLight.position.set(_worldPos.x + 3000, _worldPos.y + 4000, _worldPos.z + 2000); 
                    bloodMoonLight.target.position.copy(_worldPos);
                }
                else if (player && castleSystem && !isPreviewMode) {
                    castleSystem.update(player.wrapper, delta); 
                    player.update(delta);
                    player.cameraMount.getWorldPosition(_worldPos); 
                    bloodMoonLight.position.set(_worldPos.x + 3000, _worldPos.y + 4000, _worldPos.z + 2000); 
                    bloodMoonLight.target.position.copy(_worldPos);
                }
            }
            if (composer) composer.render();
        }

        window.onload = () => {
            window.updateSettingsUI(); // 初始化設定選單文字與顏色
            performLoading();
        };
    </script>
